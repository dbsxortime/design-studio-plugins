name: Deploy studio to Cloudflare Pages
on:
  push:
    branches: [main]
    paths:
      - 'design-studio/assets/studio.html'
      - '.github/workflows/deploy-pages.yml'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build dist
        run: mkdir -p dist && cp design-studio/assets/studio.html dist/index.html
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@latest pages deploy dist --project-name=design-studio --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
